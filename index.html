<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>بوابة الموظفين المتكاملة | FAROUK GRUP</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- AOS Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #b8860b;
            --gold-light: #d4b15a;
            --gold-soft: rgba(184,134,11,0.1);
            --dark: #0f0f0f;
            --dark-light: #1a1a1a;
            --white: #ffffff;
            --offwhite: #f9f9f9;
            --text: #333;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(184,134,11,0.03) 0px, transparent 20px),
                radial-gradient(circle at 90% 70%, rgba(184,134,11,0.03) 0px, transparent 25px),
                repeating-linear-gradient(45deg, rgba(0,0,0,0.01) 0px, rgba(0,0,0,0.01) 1px, transparent 1px, transparent 10px);
            pointer-events: none;
            z-index: -1;
        }

        .floating-shape {
            position: absolute;
            width: 300px; height: 300px; border-radius: 50%;
            background: radial-gradient(circle, rgba(184,134,11,0.1) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .shape-1 { top: -100px; right: -100px; animation: float 20s infinite ease-in-out; }
        .shape-2 { bottom: -50px; left: -50px; width: 200px; height: 200px; animation: float 15s infinite ease-in-out reverse; }
        @keyframes float {
            0% { transform: translate(0,0) rotate(0deg); }
            33% { transform: translate(30px,-30px) rotate(5deg); }
            66% { transform: translate(-20px,20px) rotate(-5deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        nav {
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
        }

        .logo { display: flex; align-items: center; gap: 15px; }
        .logo img { height: 50px; width: auto; object-fit: contain; }
        .logo h1 { font-family: 'Alexandria', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
        nav a { text-decoration: none; color: #444; margin: 0 0.8rem; font-weight: 600; transition: 0.3s; }
        nav a:hover { color: var(--gold); }
        nav a i { margin-left: 5px; }

        .login-container {
            max-width: 400px;
            margin: auto;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(15px);
            border: 2px solid var(--gold);
            border-radius: 40px;
            padding: 2.5rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            position: relative;
            z-index: 10;
        }

        .login-container h2 {
            text-align: center;
            color: var(--gold);
            font-size: 2rem;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--dark);
        }

        .input-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #ddd;
            border-radius: 50px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--gold);
            outline: none;
            box-shadow: 0 0 0 3px rgba(184,134,11,0.2);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: none;
            border-radius: 50px;
            color: #111;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #111, #222);
            color: var(--gold);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(184,134,11,0.6);
        }

        .error-message {
            color: #dc3545;
            text-align: center;
            margin-top: 1rem;
            font-weight: 700;
        }

        .dashboard {
            max-width: 1300px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            position: relative;
            z-index: 2;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(15px);
            border: 2px solid var(--gold);
            border-radius: 50px;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .datetime {
            display: flex;
            gap: 1.5rem;
            font-weight: 700;
            color: var(--dark);
        }

        .datetime i {
            color: var(--gold);
            margin-left: 0.5rem;
        }

        .logout-btn {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: var(--gold);
            color: #111;
        }

        .greeting {
            background: var(--gold-soft);
            border-radius: 50px;
            padding: 1rem 2rem;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.3rem;
            font-weight: 700;
            border: 1px solid var(--gold);
        }

        /* شبكة الأدوات - 10 أدوات */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .tool-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--gold-light);
            border-radius: 30px;
            padding: 2rem 1.5rem;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 10px 25px rgba(184,134,11,0.2);
        }

        .tool-card i {
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .tool-card h3 {
            font-size: 1.3rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
        }

        .tool-card p {
            color: #666;
            font-size: 0.9rem;
        }

        /* قسم الملاحظات والمواعيد */
        .sections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .notes-section, .appointments-section {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border: 2px solid var(--gold);
            border-radius: 30px;
            padding: 2rem;
        }

        .notes-section h3, .appointments-section h3 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gold);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        #notesArea {
            width: 100%;
            padding: 1rem;
            border: 2px solid #ddd;
            border-radius: 20px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            min-height: 120px;
            resize: vertical;
            margin-bottom: 1rem;
        }

        #notesArea:focus {
            border-color: var(--gold);
            outline: none;
        }

        .notes-actions, .appointments-actions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .action-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: none;
            border-radius: 50px;
            padding: 0.7rem 1.5rem;
            color: #111;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .action-btn:hover {
            background: linear-gradient(135deg, #111, #222);
            color: var(--gold);
            transform: translateY(-2px);
        }

        .action-btn.secondary {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
        }
        .action-btn.secondary:hover {
            background: var(--gold);
            color: #111;
        }

        .appointment-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .appointment-form input, .appointment-form textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
        }

        .appointment-form textarea {
            grid-column: span 2;
            resize: vertical;
            min-height: 70px;
            border-radius: 20px;
        }

        .appointments-list {
            max-height: 250px;
            overflow-y: auto;
            border-top: 1px solid var(--gold-soft);
            padding-top: 1rem;
        }

        .appointment-item {
            background: var(--gold-soft);
            border: 1px solid var(--gold-light);
            border-radius: 15px;
            padding: 0.8rem 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .appointment-item .date {
            font-weight: 900;
            color: var(--gold);
            margin-left: 0.5rem;
        }

        .appointment-item .delete-app {
            color: #dc3545;
            cursor: pointer;
            font-size: 1rem;
            padding: 0.2rem 0.5rem;
        }

        .quick-links {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border: 2px solid var(--gold);
            border-radius: 30px;
            padding: 2rem;
        }

        .quick-links h3 {
            color: var(--gold);
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .links-list {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .links-list a {
            background: var(--gold-soft);
            color: var(--dark);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            border: 1px solid var(--gold);
            transition: 0.3s;
        }

        .links-list a:hover {
            background: var(--gold);
            color: #111;
        }

        footer {
            background: linear-gradient(145deg, #111, #1a1a1a);
            color: #ddd;
            text-align: center;
            padding: 2rem;
            border-top: 3px solid var(--gold);
            margin-top: 2rem;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .header-bar {
                flex-direction: column;
                text-align: center;
            }
            .datetime {
                flex-direction: column;
                gap: 0.5rem;
            }
            .sections-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>

    <!-- شاشة الدخول -->
    <div id="loginScreen" class="login-container" style="margin-top: 5rem;">
        <h2><i class="fas fa-lock"></i> بوابة الموظفين</h2>
        <div class="input-group">
            <label><i class="fas fa-key"></i> الرقم السري</label>
            <input type="password" id="passwordInput" placeholder="أدخل الرقم السري">
        </div>
        <button class="login-btn" id="loginBtn">دخول</button>
        <div id="loginError" class="error-message"></div>
    </div>

    <!-- لوحة التحكم -->
    <div id="dashboard" class="dashboard hidden">
        <div class="header-bar">
            <div class="datetime">
                <div><i class="fas fa-calendar-alt"></i> <span id="currentDate"></span></div>
                <div><i class="fas fa-clock"></i> <span id="currentTime"></span></div>
            </div>
            <div>
                <span style="font-weight:700; color:var(--gold);"><i class="fas fa-user-tie"></i> الموظف</span>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
        </div>

        <div class="greeting">
            <i class="fas fa-hand-wave" style="color:var(--gold);"></i> مرحباً بك في بوابة الموظفين المتكاملة
        </div>

        <h2 style="color:var(--dark); margin-bottom:1rem;"><i class="fas fa-tools"></i> جميع الأدوات المتاحة</h2>
        <div class="tools-grid" id="toolsGrid">
            <!-- سيتم ملؤها بواسطة JS -->
        </div>

        <!-- أقسام الملاحظات والمواعيد جنباً إلى جنب -->
        <div class="sections-grid">
            <!-- ملاحظات سريعة -->
            <div class="notes-section">
                <h3><i class="fas fa-sticky-note"></i> ملاحظات سريعة</h3>
                <textarea id="notesArea" placeholder="اكتب ملاحظاتك هنا..."></textarea>
                <div class="notes-actions">
                    <button class="action-btn" id="saveLocal"><i class="fas fa-save"></i> حفظ محلياً</button>
                    <button class="action-btn secondary" id="exportNotes"><i class="fas fa-download"></i> تصدير</button>
                    <button class="action-btn secondary" id="importNotes"><i class="fas fa-upload"></i> استيراد</button>
                </div>
            </div>

            <!-- المواعيد القادمة -->
            <div class="appointments-section">
                <h3><i class="fas fa-calendar-check"></i> المواعيد القادمة</h3>
                <div class="appointment-form">
                    <input type="text" id="appTitle" placeholder="العنوان" style="grid-column: span 2;">
                    <input type="date" id="appDate" style="grid-column: span 2;">
                    <textarea id="appDesc" placeholder="وصف (اختياري)"></textarea>
                    <button class="action-btn" id="addAppBtn" style="grid-column: span 2;"><i class="fas fa-plus"></i> إضافة موعد</button>
                </div>
                <div class="appointments-list" id="appointmentsList"></div>
                <div class="appointments-actions">
                    <button class="action-btn secondary" id="exportApps"><i class="fas fa-download"></i> تصدير المواعيد</button>
                    <button class="action-btn secondary" id="openGoogleCalendar" onclick="window.open('https://calendar.google.com/calendar/u/0/r','_blank')">
                        <i class="fab fa-google"></i> فتح تقويم جوجل
                    </button>
                </div>
            </div>
        </div>

        <!-- روابط مفيدة -->
        <div class="quick-links">
            <h3><i class="fas fa-link"></i> روابط مفيدة</h3>
            <div class="links-list">
                <a href="https://www.farouk-grup.com" target="_blank">الموقع الرسمي</a>
                <a href="https://training.farouk-grup.com" target="_blank">منصة التدريب</a>
                <a href="https://wa.me/905550196682" target="_blank">دعم واتساب</a>
                <a href="mailto:faroukgrup@gmail.com">البريد الإلكتروني</a>
            </div>
        </div>
    </div>

    <footer>
        <p>جميع الحقوق محفوظة © 2026 FAROUK GRUP</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true, offset: 100 });

        // ---------- كلمة المرور الجديدة ----------
        const SECRET_PASSWORD = "632014";  // تغيرت إلى 632014

        // ---------- بيانات الأدوات ----------
        const tools = [
            { name: "أداة توليد محتوى ذكية", icon: "fa-robot", desc: "نصوص إبداعية بالذكاء الاصطناعي", url: "https://portal.farouk-grup.com/AI" },
            { name: "آلة حاسبة محترفة", icon: "fa-calculator", desc: "عمليات حسابية متقدمة مع السجل", url: "https://portal.farouk-grup.com/Calculator" },
            { name: "حاسبة العائد على الاستثمار (ROI)", icon: "fa-chart-line", desc: "ROI لأي مشروع", url: "https://portal.farouk-grup.com/ROI" },
            { name: "حاسبة الاستثمار العقاري", icon: "fa-building", desc: "NPV, IRR, فترة الاسترداد", url: "https://portal.farouk-grup.com/Real-Estate-ROI" },
            { name: "حاسبة تكاليف المطاعم", icon: "fa-utensils", desc: "تحليل التكاليف ونقطة التعادل", url: "https://portal.farouk-grup.com/Restaurant-Costs" },
            { name: "دراسة جدوى مالية شاملة", icon: "fa-chart-pie", desc: "تحليل متكامل للمشاريع", url: "https://portal.farouk-grup.com/Feasibility-Study" },
            { name: "حاسبة التدفق النقدي الحر", icon: "fa-coins", desc: "FCFF وتحليل السيولة", url: "https://portal.farouk-grup.com/Free-Cash-Flow" },
            { name: "تحليل الحساسية", icon: "fa-wave-square", desc: "تأثير المتغيرات على NPV", url: "https://portal.farouk-grup.com/Sensitivity-Analysis" },
            { name: "جدولة القروض", icon: "fa-hand-holding-usd", desc: "جدول سداد القرض", url: "https://portal.farouk-grup.com/Loan-Amortization-Schedule" },
            { name: "حاسبة WACC", icon: "fa-scale-balanced", desc: "متوسط تكلفة رأس المال", url: "https://portal.farouk-grup.com/WACC" },
            { name: "حاسبة الإهلاك", icon: "fa-chart-simple", desc: "إهلاك الأصول بطرق متعددة", url: "https://portal.farouk-grup.com/Depreciation-Calculator" }
        ];

        // عناصر الصفحة
        const loginScreen = document.getElementById('loginScreen');
        const dashboard = document.getElementById('dashboard');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const currentDateSpan = document.getElementById('currentDate');
        const currentTimeSpan = document.getElementById('currentTime');

        // عناصر الملاحظات
        const notesArea = document.getElementById('notesArea');
        const saveLocalBtn = document.getElementById('saveLocal');
        const exportBtn = document.getElementById('exportNotes');
        const importBtn = document.getElementById('importNotes');

        // عناصر المواعيد
        const appTitle = document.getElementById('appTitle');
        const appDate = document.getElementById('appDate');
        const appDesc = document.getElementById('appDesc');
        const addAppBtn = document.getElementById('addAppBtn');
        const appointmentsList = document.getElementById('appointmentsList');
        const exportAppsBtn = document.getElementById('exportApps');

        // ---------- بناء شبكة الأدوات ----------
        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            grid.innerHTML = '';
            tools.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'tool-card';
                card.onclick = () => window.open(tool.url, '_blank');
                card.innerHTML = `
                    <i class="fas ${tool.icon}"></i>
                    <h3>${tool.name}</h3>
                    <p>${tool.desc}</p>
                `;
                grid.appendChild(card);
            });
        }

        // ---------- دوال الملاحظات (كما هي مع تحسين طفيف) ----------
        function loadNotesLocal() {
            const saved = localStorage.getItem('employeeNotes');
            if (saved) notesArea.value = saved;
        }

        function saveNotesLocal() {
            localStorage.setItem('employeeNotes', notesArea.value);
            saveLocalBtn.innerHTML = '<i class="fas fa-check"></i> تم';
            setTimeout(() => {
                saveLocalBtn.innerHTML = '<i class="fas fa-save"></i> حفظ محلياً';
            }, 1500);
        }

        function exportToFile() {
            const content = notesArea.value;
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            const today = new Date().toISOString().split('T')[0];
            link.download = `ملاحظات_${today}.txt`;
            link.href = URL.createObjectURL(blob);
            link.click();
            URL.revokeObjectURL(link.href);
        }

        function importFromFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.txt';
            input.onchange = (event) => {
                const file = event.target.files[0];
                const reader = new FileReader();
                reader.onload = (e) => notesArea.value = e.target.result;
                reader.readAsText(file);
            };
            input.click();
        }

        // ---------- دوال المواعيد ----------
        let appointments = [];

        function loadAppointments() {
            const saved = localStorage.getItem('employeeAppointments');
            if (saved) {
                appointments = JSON.parse(saved);
            } else {
                // بيانات تجريبية
                appointments = [
                    { title: 'ستظهر هنا', date: '2026-00-00', desc: 'يمكن ازالتها ' },
                ];
            }
            renderAppointments();
        }

        function saveAppointments() {
            localStorage.setItem('employeeAppointments', JSON.stringify(appointments));
            renderAppointments();
        }

        function renderAppointments() {
            appointmentsList.innerHTML = '';
            // ترتيب تصاعدي حسب التاريخ
            const sorted = [...appointments].sort((a,b) => a.date.localeCompare(b.date));
            sorted.forEach((app, index) => {
                const item = document.createElement('div');
                item.className = 'appointment-item';
                const dateObj = new Date(app.date);
                const formattedDate = dateObj.toLocaleDateString('ar-EG', { year:'numeric', month:'short', day:'numeric' });
                item.innerHTML = `
                    <div>
                        <span class="date">${formattedDate}</span>
                        <strong>${app.title}</strong> - ${app.desc || ''}
                    </div>
                    <span class="delete-app" data-index="${appointments.indexOf(app)}"><i class="fas fa-times-circle"></i></span>
                `;
                appointmentsList.appendChild(item);
            });

            // إضافة حدث الحذف لكل عنصر
            document.querySelectorAll('.delete-app').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const index = btn.dataset.index;
                    appointments.splice(index, 1);
                    saveAppointments();
                });
            });
        }

        function addAppointment() {
            const title = appTitle.value.trim();
            const date = appDate.value;
            if (!title || !date) {
                alert('الرجاء إدخال عنوان وتاريخ للموعد');
                return;
            }
            appointments.push({ title, date, desc: appDesc.value.trim() });
            saveAppointments();
            appTitle.value = '';
            appDate.value = '';
            appDesc.value = '';
        }

        function exportAppointmentsToFile() {
            const lines = appointments.map(a => `${a.date},${a.title},${a.desc || ''}`).join('\n');
            const header = 'التاريخ,العنوان,الوصف\n';
            const blob = new Blob(['\uFEFF' + header + lines], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const today = new Date().toISOString().split('T')[0];
            link.download = `مواعيد_${today}.csv`;
            link.href = URL.createObjectURL(blob);
            link.click();
            URL.revokeObjectURL(link.href);
        }

        // ---------- تحديث التاريخ والوقت ----------
        function updateDateTime() {
            const now = new Date();
            const optionsDate = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            const optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
            currentDateSpan.textContent = now.toLocaleDateString('ar-EG', optionsDate);
            currentTimeSpan.textContent = now.toLocaleTimeString('ar-EG', optionsTime);
        }

        // ---------- التحقق من الدخول ----------
        function checkLogin() {
            const isLoggedIn = sessionStorage.getItem('employeeLoggedIn') === 'true';
            if (isLoggedIn) {
                loginScreen.classList.add('hidden');
                dashboard.classList.remove('hidden');
                loadNotesLocal();
                loadAppointments();
                updateDateTime();
                setInterval(updateDateTime, 1000);
            } else {
                loginScreen.classList.remove('hidden');
                dashboard.classList.add('hidden');
            }
        }

        // ---------- أحداث الدخول والخروج ----------
        loginBtn.addEventListener('click', function() {
            const enteredPassword = passwordInput.value;
            if (enteredPassword === SECRET_PASSWORD) {
                sessionStorage.setItem('employeeLoggedIn', 'true');
                loginError.textContent = '';
                passwordInput.value = '';
                checkLogin();
            } else {
                loginError.textContent = '❌ الرقم السري غير صحيح';
            }
        });

        logoutBtn.addEventListener('click', function() {
            sessionStorage.removeItem('employeeLoggedIn');
            checkLogin();
        });

        // ربط أزرار الملاحظات
        saveLocalBtn.addEventListener('click', saveNotesLocal);
        exportBtn.addEventListener('click', exportToFile);
        importBtn.addEventListener('click', importFromFile);

        // ربط أزرار المواعيد
        addAppBtn.addEventListener('click', addAppointment);
        exportAppsBtn.addEventListener('click', exportAppointmentsToFile);

        // دعم Enter
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loginBtn.click();
        });

        // تهيئة الأدوات
        renderTools();

        // بدء التحقق
        checkLogin();
    </script>
</body>
</html>
